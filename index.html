<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAUMA.EXE — Nervous System Diagnostic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        :root {
            --fight: #ff073a;
            --flight: #00f5ff;
            --freeze: #7209b7;
            --fawn: #f1c40f;
            --bg: #0b0b0f;
            --surface: #1a1a1f;
            --surface2: #2a2a35;
            --text: #e0e0e0;
            --muted: #888899;
            --green: #39ff14;
            --red: #ff0040;
            --violet: #8b00ff;
            --orange: #ff6b00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Canvas layers ───────────────────────────── */
        #neural-canvas {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        #burst-canvas {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent, transparent 2px,
                rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        /* ── Boot screen ─────────────────────────────── */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            transition: opacity 0.8s ease;
        }

        #boot-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .boot-terminal {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            color: var(--green);
            max-width: 620px;
            width: 100%;
            line-height: 1.9;
        }

        .boot-line {
            display: block;
            opacity: 0;
        }
        .boot-line.show { opacity: 1; }

        .boot-cursor {
            display: inline-block;
            width: 9px; height: 1.1em;
            background: var(--green);
            vertical-align: middle;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        .bc-err  { color: var(--red); }
        .bc-warn { color: var(--orange); }
        .bc-info { color: var(--flight); }
        .bc-dim  { color: var(--muted); }

        /* ── Main app ────────────────────────────────── */
        #app {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #app.visible { opacity: 1; }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding: 40px 30px 36px;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(57,255,20,0.25);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            height: 2px; width: 0;
            background: linear-gradient(90deg, var(--green), var(--red), var(--violet));
            animation: hdrScan 5s ease-in-out infinite;
        }

        @keyframes hdrScan {
            0%   { width: 0;    left: 0;    }
            50%  { width: 100%; left: 0;    }
            50.1%{ width: 100%; left: 0;    }
            100% { width: 0;    left: 100%; }
        }

        .header-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--green);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 14px;
            opacity: 0.6;
        }

        .header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
        }

        /* True clip-path glitch */
        .glitch-wrap {
            display: inline-block;
            position: relative;
        }
        .glitch-wrap::before,
        .glitch-wrap::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
        }
        .glitch-wrap::before {
            color: var(--fight);
            clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
            animation: glitchTop 7s infinite;
        }
        .glitch-wrap::after {
            color: var(--flight);
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
            animation: glitchBot 7s infinite;
        }

        @keyframes glitchTop {
            0%,87%,100% { transform: translate(0);   opacity: 0; }
            89%          { transform: translate(-4px, 1px);  opacity: 0.9; }
            91%          { transform: translate(4px, -1px);  opacity: 0.9; }
            93%          { transform: translate(-2px, 0);    opacity: 0.5; }
        }
        @keyframes glitchBot {
            0%,85%,100% { transform: translate(0);   opacity: 0; }
            87%          { transform: translate(4px, -1px);  opacity: 0.8; }
            90%          { transform: translate(-4px, 1px);  opacity: 0.8; }
            92%          { transform: translate(2px, 0);     opacity: 0.5; }
        }

        .header p {
            font-size: 1rem;
            color: var(--muted);
            font-style: italic;
        }

        /* Accumulator dots */
        .accumulator {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
            height: 18px;
            align-items: center;
        }

        .acc-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .acc-dot.fight  { background: var(--fight);  box-shadow: 0 0 10px var(--fight);  transform: scale(1.3); }
        .acc-dot.flight { background: var(--flight); box-shadow: 0 0 10px var(--flight); transform: scale(1.3); }
        .acc-dot.freeze { background: var(--freeze); box-shadow: 0 0 10px var(--freeze); transform: scale(1.3); }
        .acc-dot.fawn   { background: var(--fawn);   box-shadow: 0 0 10px var(--fawn);   transform: scale(1.3); }

        /* Progress */
        .progress-wrap { margin-bottom: 28px; }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .progress-bar {
            width: 100%; height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--red), var(--violet));
            width: 0%;
            transition: width 0.8s cubic-bezier(0.23,1,0.32,1);
        }

        /* ── Questions ───────────────────────────────── */
        .question-container {
            display: none;
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.23,1,0.32,1);
        }
        .question-container.active  { display: block; }
        .question-container.visible { opacity: 1; transform: translateY(0); }

        .question-card {
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 38px 40px 32px;
            margin-bottom: 20px;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            opacity: 0.35;
        }

        .q-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--green);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 18px;
            opacity: 0.55;
        }

        .question {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1rem, 2.2vw, 1.4rem);
            font-weight: 600;
            color: var(--text);
            line-height: 1.55;
            margin-bottom: 30px;
            min-height: 3.5em;
        }

        .question .cursor {
            display: inline-block;
            width: 3px; height: 1em;
            background: var(--green);
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 0.7s step-end infinite;
        }

        .options { display: grid; gap: 12px; }

        .option {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 6px;
            padding: 18px 22px;
            cursor: pointer;
            transition: all 0.22s ease;
            font-size: 0.95rem;
            color: var(--muted);
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .option-letter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--green);
            opacity: 0.4;
            min-width: 14px;
            margin-top: 3px;
            transition: opacity 0.2s;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.5s ease;
        }
        .option:hover::before { left: 100%; }

        /* Per-type hover glow */
        .option[data-type="fight"]:hover {
            border-color: var(--fight); color: var(--text);
            box-shadow: 0 0 20px rgba(255,7,58,0.12), inset 0 0 20px rgba(255,7,58,0.04);
        }
        .option[data-type="flight"]:hover {
            border-color: var(--flight); color: var(--text);
            box-shadow: 0 0 20px rgba(0,245,255,0.12), inset 0 0 20px rgba(0,245,255,0.04);
        }
        .option[data-type="freeze"]:hover {
            border-color: var(--freeze); color: var(--text);
            box-shadow: 0 0 20px rgba(114,9,183,0.15), inset 0 0 20px rgba(114,9,183,0.05);
        }
        .option[data-type="fawn"]:hover {
            border-color: var(--fawn); color: var(--text);
            box-shadow: 0 0 20px rgba(241,196,15,0.12), inset 0 0 20px rgba(241,196,15,0.04);
        }

        .option:hover .option-letter { opacity: 1; }
        .option:active { transform: scale(0.99); }

        /* ── Results ─────────────────────────────────── */
        #results {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #results.visible { opacity: 1; }

        .result-card {
            background: rgba(0,0,0,0.88);
            border-radius: 10px;
            padding: 60px 44px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        /* Accent border (colored, top + bottom) */
        .result-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            animation: borderPulse 2s ease-in-out infinite;
        }
        .result-card.fight::before  { background: linear-gradient(90deg, transparent, var(--fight),  transparent); }
        .result-card.flight::before { background: linear-gradient(90deg, transparent, var(--flight), transparent); }
        .result-card.freeze::before { background: linear-gradient(90deg, transparent, var(--freeze), transparent); }
        .result-card.fawn::before   { background: linear-gradient(90deg, transparent, var(--fawn),   transparent); }

        @keyframes borderPulse {
            0%,100% { opacity: 0.5; }
            50%     { opacity: 1; }
        }

        /* Horizontal scan line */
        .result-scan {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 2px;
            opacity: 0.4;
            animation: scanDown 3.5s linear infinite;
            pointer-events: none;
        }
        .result-card.fight  .result-scan { background: var(--fight);  }
        .result-card.flight .result-scan { background: var(--flight); }
        .result-card.freeze .result-scan { background: var(--freeze); }
        .result-card.fawn   .result-scan { background: var(--fawn);   }

        @keyframes scanDown {
            0%   { top: 0; }
            100% { top: calc(100% - 2px); }
        }

        .result-sys-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 28px;
            opacity: 0.6;
        }

        .result-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 20px;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%,100% { transform: translateY(0) scale(1); }
            50%     { transform: translateY(-10px) scale(1.06); }
        }

        .result-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1.7rem, 4vw, 2.6rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .result-card.fight  .result-title { color: var(--fight);  text-shadow: 0 0 30px var(--fight);  }
        .result-card.flight .result-title { color: var(--flight); text-shadow: 0 0 30px var(--flight); }
        .result-card.freeze .result-title { color: var(--freeze); text-shadow: 0 0 30px var(--freeze); }
        .result-card.fawn   .result-title { color: var(--fawn);   text-shadow: 0 0 30px var(--fawn);   }

        .result-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .result-divider {
            width: 80px; height: 1px;
            margin: 0 auto 28px;
            opacity: 0.3;
        }
        .result-card.fight  .result-divider { background: var(--fight);  }
        .result-card.flight .result-divider { background: var(--flight); }
        .result-card.freeze .result-divider { background: var(--freeze); }
        .result-card.fawn   .result-divider { background: var(--fawn);   }

        .result-description {
            font-size: 1.05rem;
            line-height: 1.85;
            color: var(--text);
            max-width: 620px;
            margin: 0 auto 44px;
        }

        /* Score breakdown */
        .score-breakdown {
            max-width: 480px;
            margin: 0 auto 44px;
            text-align: left;
        }

        .score-heading {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 18px;
            text-align: center;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .score-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            width: 54px;
            text-transform: uppercase;
        }

        .score-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.04);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 1.1s cubic-bezier(0.23,1,0.32,1);
        }
        .score-bar.fight  { background: var(--fight);  box-shadow: 0 0 8px var(--fight);  }
        .score-bar.flight { background: var(--flight); box-shadow: 0 0 8px var(--flight); }
        .score-bar.freeze { background: var(--freeze); box-shadow: 0 0 8px var(--freeze); }
        .score-bar.fawn   { background: var(--fawn);   box-shadow: 0 0 8px var(--fawn);   }

        .score-pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            width: 34px;
            text-align: right;
        }

        /* Restart button */
        .restart-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 4px;
            padding: 13px 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .restart-btn:hover {
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 20px rgba(57,255,20,0.1);
        }

        /* ── Responsive ─────────────────────────────── */
        @media (max-width: 600px) {
            #app { padding: 15px; }
            .question-card { padding: 24px 18px 22px; }
            .result-card { padding: 38px 20px; }
            .option { padding: 15px 16px; }
        }
    </style>
</head>
<body>
    <canvas id="neural-canvas"></canvas>
    <canvas id="burst-canvas"></canvas>
    <div class="scanlines"></div>

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="boot-terminal" id="boot-terminal"></div>
    </div>

    <!-- Main App -->
    <div id="app">
        <div class="header">
            <div class="header-label">// diagnostic_module_v2.7 — interactive_edition</div>
            <h1>
                <span class="glitch-wrap" data-text="TRAUMA.EXE">TRAUMA.EXE</span>
            </h1>
            <p>Scanning nervous system for malfunction patterns&hellip;</p>
        </div>

        <div class="accumulator" id="accumulator"></div>

        <div class="progress-wrap">
            <div class="progress-meta">
                <span id="progress-label">SCAN 0/8</span>
                <span id="progress-pct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div id="questions-wrap"></div>
        <div id="results"></div>
    </div>

    <script>
    // ═══════════════════════════════════════════════
    //  DATA
    // ═══════════════════════════════════════════════

    ];

    const RESULTS = {
        fight: {
            icon: "🐍",
            title: "FIGHT PROTOCOL",
            subtitle: "AGGRESSION.dll loaded successfully",
            description: "Congratulations — you're a beautiful disaster of controlled chaos. Your nervous system chose violence as its primary operating system, with a delightful twist of apologetic confusion afterward. You're basically a feral cat that writes thank-you notes: ready to destroy everything while simultaneously feeling terrible about it. Your trauma response is premium-grade spite with a side of existential dread, and honestly? Deeply relatable. The rage is valid. The thank-you note is also valid.",
            restart: "RESTART MALFUNCTION"
        },
        flight: {
            icon: "🐇",
            title: "FLIGHT MODE",
            subtitle: "ESCAPE_VECTOR.sys active",
            description: "You're the Houdini of emotional avoidance — except instead of escaping handcuffs, you're escaping feelings. Your superpower is being physically present while your soul is already three states away making questionable online purchases. You've turned dissociation into a fine art. Your legs may have abandoned you, but your credit card is working overtime. The void isn't chasing you; you're just incredibly, impressively, legendarily fast.",
            restart: "ESCAPE AGAIN"
        },
        freeze: {
            icon: "🧊",
            title: "FREEZE SEQUENCE",
            subtitle: "SYSTEM_HALT.exe running",
            description: "You're a computer trying to run 47 programs simultaneously — and everything just stops working. When overwhelmed, you transform into a sentient statue with the emotional processing power of a broken calculator. You've mastered the art of being present in body while your brain has temporarily relocated to another dimension. Sock textures are your kryptonite. Your operating system requires a hard reboot and approximately six weighted blankets to function again.",
            restart: "DEFROST SYSTEM"
        },
        fawn: {
            icon: "🐦",
            title: "FAWN SUBROUTINE",
            subtitle: "APPEASEMENT_MODULE.exe running",
            description: "You're the human embodiment of 'sorry for existing' — a walking apology with anxiety sprinkles and a side of nervous laughter. You've weaponized people-pleasing to an Olympic level. Your biggest fear isn't death; it's someone being mildly inconvenienced by your presence on this planet. You write apology emails to inanimate objects and thank your therapist for letting you pay them. You're basically a golden retriever having an existential crisis in corporate business casual.",
            restart: "APOLOGETICALLY RETRY"
        }
    };

    const RESPONSE_COLORS = {
        fight:  [255,  7, 58],
        flight: [  0,245,255],
        freeze: [114,  9,183],
        fawn:   [241,196, 15]
    };

    // ═══════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════
    let currentQ = 0;
    let counts    = { fight:0, flight:0, freeze:0, fawn:0 };
    let locked    = false; // prevent double-click

    // Canvas color lerped toward dominant response
    let canvasColor  = [57,255,20];
    let targetColor  = [57,255,20];

    // ═══════════════════════════════════════════════
    //  NEURAL CANVAS
    // ═══════════════════════════════════════════════
    const neuralCanvas = document.getElementById('neural-canvas');
    const nCtx         = neuralCanvas.getContext('2d');

    function resizeNeural() {
        neuralCanvas.width  = window.innerWidth;
        neuralCanvas.height = window.innerHeight;
    }
    resizeNeural();
    window.addEventListener('resize', resizeNeural);

    const PARTICLE_N = 65;
    const particles  = [];

    class NParticle {
        constructor() { this.reset(true); }
        reset(random) {
            this.x  = random ? Math.random() * neuralCanvas.width  : (Math.random() < 0.5 ? 0 : neuralCanvas.width);
            this.y  = random ? Math.random() * neuralCanvas.height : (Math.random() < 0.5 ? 0 : neuralCanvas.height);
            this.vx = (Math.random() - 0.5) * 0.35;
            this.vy = (Math.random() - 0.5) * 0.35;
            this.r  = Math.random() * 1.8 + 0.4;
            this.a  = Math.random() * 0.45 + 0.08;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > neuralCanvas.width)  this.vx *= -1;
            if (this.y < 0 || this.y > neuralCanvas.height)  this.vy *= -1;
        }
        draw() {
            nCtx.beginPath();
            nCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            nCtx.fillStyle = `rgba(${canvasColor[0]},${canvasColor[1]},${canvasColor[2]},${this.a})`;
            nCtx.fill();
        }
    }

    for (let i = 0; i < PARTICLE_N; i++) particles.push(new NParticle());

    function lerpColor(a, b, t) {
        return a.map((v,i) => Math.round(v + (b[i]-v) * t));
    }

    (function neuralLoop() {
        requestAnimationFrame(neuralLoop);
        canvasColor = lerpColor(canvasColor, targetColor, 0.008);

        nCtx.clearRect(0, 0, neuralCanvas.width, neuralCanvas.height);

        for (let i = 0; i < PARTICLE_N; i++) {
            for (let j = i+1; j < PARTICLE_N; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < 130) {
                    const a = (1 - d/130) * 0.12;
                    nCtx.beginPath();
                    nCtx.moveTo(particles[i].x, particles[i].y);
                    nCtx.lineTo(particles[j].x, particles[j].y);
                    nCtx.strokeStyle = `rgba(${canvasColor[0]},${canvasColor[1]},${canvasColor[2]},${a})`;
                    nCtx.lineWidth = 0.6;
                    nCtx.stroke();
                }
            }
            particles[i].update();
            particles[i].draw();
        }
    })();

    // ═══════════════════════════════════════════════
    //  BURST CANVAS
    // ═══════════════════════════════════════════════
    const burstCanvas = document.getElementById('burst-canvas');
    const bCtx        = burstCanvas.getContext('2d');

    function resizeBurst() {
        burstCanvas.width  = window.innerWidth;
        burstCanvas.height = window.innerHeight;
    }
    resizeBurst();
    window.addEventListener('resize', resizeBurst);

    const bParticles = [];

    class BParticle {
        constructor(x, y, rgb) {
            this.x = x; this.y = y; this.rgb = rgb;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 1.5;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.r    = Math.random() * 4 + 1;
            this.life = 1;
        }
        update() {
            this.x  += this.vx;
            this.y  += this.vy;
            this.vy += 0.12;
            this.vx *= 0.97;
            this.life -= 0.028;
        }
        draw() {
            bCtx.beginPath();
            bCtx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
            bCtx.fillStyle = `rgba(${this.rgb},${this.life})`;
            bCtx.fill();
        }
    }

    function burst(x, y, rgb) {
        for (let i = 0; i < 32; i++) bParticles.push(new BParticle(x, y, rgb));
    }

    (function burstLoop() {
        requestAnimationFrame(burstLoop);
        bCtx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
        for (let i = bParticles.length - 1; i >= 0; i--) {
            bParticles[i].update();
            bParticles[i].draw();
            if (bParticles[i].life <= 0) bParticles.splice(i, 1);
        }
    })();

    // ═══════════════════════════════════════════════
    //  WEB AUDIO
    // ═══════════════════════════════════════════════
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function tone(freq, type='sine', dur=0.18, vol=0.045) {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq * 0.75, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }

    const TONE_MAP = {
        fight:  { freq: 220, type: 'sawtooth' },
        flight: { freq: 660, type: 'sine'     },
        freeze: { freq: 110, type: 'square'   },
        fawn:   { freq: 440, type: 'triangle' }
    };

    function playClick(rType) {
        const t = TONE_MAP[rType] || { freq: 330, type: 'sine' };
        tone(t.freq, t.type, 0.22, 0.05);
    }

    function playReveal() {
        if (!audioCtx) return;
        [220,277,330,415,523,659].forEach((f,i) =>
            setTimeout(() => tone(f,'sine',0.45,0.055), i * 110)
        );
    }

    // ═══════════════════════════════════════════════
    //  BOOT SEQUENCE
    // ═══════════════════════════════════════════════
    const BOOT_LINES = [
        { t: "TRAUMA.EXE v2.7  —  PSYCHOLOGICAL DIAGNOSTIC SUITE",     c: ""       },
        { t: "Copyright (c) Your Nervous System, All Rights Waived",    c: "bc-dim" },
        { t: "──────────────────────────────────────────────────────",  c: "bc-dim" },
        { t: "> Initializing coping_mechanism_database.dll ...",        c: ""       },
        { t: "> Loading attachment_wound_analyzer ...",                  c: ""       },
        { t: "> Connecting to nervous_system_api ...",                   c: ""       },
        { t: "> WARNING: Unresolved childhood_experiences detected",    c: "bc-warn" },
        { t: "> WARNING: Hypervigilance module running at 400%",        c: "bc-warn" },
        { t: "> ERROR: healthy_boundaries.exe — FILE NOT FOUND",        c: "bc-err"  },
        { t: "> Scanning available trauma_responses ...",               c: ""       },
        { t: ">   [FIGHT] [FLIGHT] [FREEZE] [FAWN]  — all loaded",     c: "bc-info" },
        { t: "> Calibrating dark_humor_tolerance.dll ...",              c: ""       },
        { t: "──────────────────────────────────────────────────────",  c: "bc-dim" },
        { t: "BEGIN DIAGNOSTIC? [Y] >",                                  c: ""       },
    ];

    async function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function runBoot() {
        const terminal = document.getElementById('boot-terminal');

        for (const line of BOOT_LINES) {
            await delay(Math.random() * 120 + 40);
            const el = document.createElement('div');
            el.className = `boot-line ${line.c}`;
            el.textContent = line.t;
            terminal.appendChild(el);
            // micro-flash in
            requestAnimationFrame(() => el.classList.add('show'));
        }

        await delay(700);

        // Auto Y
        terminal.lastElementChild.textContent = "BEGIN DIAGNOSTIC? [Y] > Y_";
        await delay(200);
        terminal.lastElementChild.textContent = "BEGIN DIAGNOSTIC? [Y] > Y";

        await delay(500);
        document.getElementById('boot-screen').classList.add('fade-out');
        await delay(800);
        document.getElementById('boot-screen').style.display = 'none';

        buildUI();
        const app = document.getElementById('app');
        app.classList.add('visible');
        await delay(200);
        showQuestion(0);
    }

    // ═══════════════════════════════════════════════
    //  BUILD UI
    // ═══════════════════════════════════════════════
    function buildUI() {
        const acc  = document.getElementById('accumulator');
        const wrap = document.getElementById('questions-wrap');
        const LETS = ['A','B','C','D'];

        // Accumulator dots
        for (let i = 0; i < QUESTIONS.length; i++) {
            const d = document.createElement('div');
            d.className = 'acc-dot';
            d.id = `dot-${i}`;
            acc.appendChild(d);
        }

        // Question cards
        QUESTIONS.forEach((q, qi) => {
            const opts = q.options.map((o, oi) => `
                <div class="option" data-response="${o.r}" data-type="${o.t}" data-qi="${qi}" role="button" tabindex="0">
                    <span class="option-letter">${LETS[oi]}</span>
                    <span>${o.text}</span>
                </div>`).join('');

            const el = document.createElement('div');
            el.className = 'question-container';
            el.id = `q-${qi}`;
            el.innerHTML = `
                <div class="question-card">
                    <div class="q-number">// QUERY_${String(qi+1).padStart(2,'0')} &nbsp; ${q.emoji}</div>
                    <div class="question" id="qtext-${qi}"></div>
                    <div class="options">${opts}</div>
                </div>`;
            wrap.appendChild(el);
        });
    }

    // ═══════════════════════════════════════════════
    //  TYPEWRITER
    // ═══════════════════════════════════════════════
    async function typeQuestion(qi) {
        const el   = document.getElementById(`qtext-${qi}`);
        const text = QUESTIONS[qi].text;
        el.innerHTML = '';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        el.appendChild(cursor);

        for (const ch of text) {
            cursor.before(document.createTextNode(ch));
            await delay(16 + Math.random() * 18);
        }
        await delay(250);
        cursor.remove();
    }

    // ═══════════════════════════════════════════════
    //  SHOW QUESTION
    // ═══════════════════════════════════════════════
    async function showQuestion(qi) {
        const pct = Math.round((qi / QUESTIONS.length) * 100);
        document.getElementById('progress-fill').style.width  = pct + '%';
        document.getElementById('progress-label').textContent = `SCAN ${qi}/${QUESTIONS.length}`;
        document.getElementById('progress-pct').textContent   = pct + '%';

        const container = document.getElementById(`q-${qi}`);
        container.classList.add('active');
        await delay(40);
        container.classList.add('visible');
        typeQuestion(qi);
        locked = false;
    }

    // ═══════════════════════════════════════════════
    //  OPTION INTERACTION
    // ═══════════════════════════════════════════════
    document.addEventListener('click', handleOption);
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
            const t = document.activeElement;
            if (t && t.classList.contains('option')) handleOption({ target: t });
        }
    });

    async function handleOption(e) {
        const option = e.target.closest?.('.option') || (e.target.classList?.contains('option') ? e.target : null);
        if (!option || locked) return;
        locked = true;

        initAudio();

        const rType = option.getAttribute('data-response'); // primary type (no compound)
        const qi    = parseInt(option.getAttribute('data-qi'));

        // Record
        counts[rType]++;

        // Dot color
        document.getElementById(`dot-${qi}`).className = `acc-dot ${rType}`;

        // Shift canvas target color
        const top = Object.keys(counts).reduce((a,b) => counts[a] > counts[b] ? a : b);
        targetColor = RESPONSE_COLORS[top];

        // Burst at click position
        const rect = option.getBoundingClientRect();
        const rgb  = RESPONSE_COLORS[rType].join(',');
        burst(rect.left + rect.width/2, rect.top + rect.height/2, rgb);

        // Audio
        playClick(rType);

        // Dim the selected option
        option.style.opacity = '0.45';
        option.style.pointerEvents = 'none';

        await delay(380);

        // Transition out
        const container = document.getElementById(`q-${qi}`);
        container.classList.remove('visible');
        await delay(450);
        container.classList.remove('active');

        currentQ++;
        if (currentQ < QUESTIONS.length) {
            showQuestion(currentQ);
        } else {
            // Final bar
            document.getElementById('progress-fill').style.width  = '100%';
            document.getElementById('progress-label').textContent = `SCAN ${QUESTIONS.length}/${QUESTIONS.length}`;
            document.getElementById('progress-pct').textContent   = '100%';
            await delay(600);
            showResult();
        }
    }

    // ═══════════════════════════════════════════════
    //  SHOW RESULT
    // ═══════════════════════════════════════════════
    async function showResult() {
        const dominant = Object.keys(counts).reduce((a,b) => counts[a] > counts[b] ? a : b);
        const R        = RESULTS[dominant];
        const total    = Object.values(counts).reduce((a,b) => a+b, 0);

        const scoreRows = Object.keys(counts).map(k => {
            const pct = Math.round((counts[k] / total) * 100);
            return `
                <div class="score-row">
                    <span class="score-label">${k}</span>
                    <div class="score-track">
                        <div class="score-bar ${k}" id="bar-${k}"></div>
                    </div>
                    <span class="score-pct">${pct}%</span>
                </div>`;
        }).join('');

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `
            <div class="result-card ${dominant}">
                <div class="result-scan"></div>
                <div class="result-sys-label">// diagnostic_complete &mdash; pattern_identified</div>
                <span class="result-icon">${R.icon}</span>
                <div class="result-title">${R.title}</div>
                <div class="result-subtitle">${R.subtitle}</div>
                <div class="result-divider"></div>
                <div class="result-description">${R.description}</div>
                <div class="score-breakdown">
                    <div class="score-heading">// nervous_system_fingerprint</div>
                    ${scoreRows}
                </div>
                <button class="restart-btn" id="restart-btn">${R.restart}</button>
            </div>`;

        resultsDiv.style.display = 'block';
        await delay(80);
        resultsDiv.classList.add('visible');

        // Animate score bars after a beat
        await delay(500);
        Object.keys(counts).forEach(k => {
            const pct = Math.round((counts[k] / total) * 100);
            document.getElementById(`bar-${k}`).style.width = pct + '%';
        });

        // Final canvas shift
        targetColor = RESPONSE_COLORS[dominant];
        playReveal();

        document.getElementById('restart-btn').addEventListener('click', restartQuiz);
    }

    // ═══════════════════════════════════════════════
    //  RESTART
    // ═══════════════════════════════════════════════
    function restartQuiz() {
        currentQ     = 0;
        counts       = { fight:0, flight:0, freeze:0, fawn:0 };
        targetColor  = [57,255,20];
        locked       = false;

        // Reset dots
        for (let i = 0; i < QUESTIONS.length; i++) {
            document.getElementById(`dot-${i}`).className = 'acc-dot';
        }

        // Reset progress
        document.getElementById('progress-fill').style.width  = '0%';
        document.getElementById('progress-label').textContent = `SCAN 0/${QUESTIONS.length}`;
        document.getElementById('progress-pct').textContent   = '0%';

        // Hide results
        const rd = document.getElementById('results');
        rd.classList.remove('visible');
        rd.style.display = 'none';

        // Reset options
        document.querySelectorAll('.option').forEach(el => {
            el.style.opacity = '';
            el.style.pointerEvents = '';
        });
        document.querySelectorAll('.question-container').forEach(el => {
            el.classList.remove('active','visible');
        });

        setTimeout(() => showQuestion(0), 250);
    }

    // ── Go ────────────────────────────────────────
    runBoot();
    </script>
</body>
